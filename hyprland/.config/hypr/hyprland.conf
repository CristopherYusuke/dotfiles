
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################
#
#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#
source=~/.config/hypr/mocha.conf

#exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

exec-once = hyprctl setcursor catppuccin-mocha-dark-cursors 28
exec-once= waybar & swaync & hyprpaper & hypridle

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,3840x2160@120,0x0,1.20

# See https://wiki.hyprland.org//Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf
# Set programs that you use
$terminal = kitty 
$fileManager = dolphin 
$menu = wofi --show drun

xwayland {
    force_zero_scaling = true
}

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =
    kb_options = ctrl:nocaps

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }
    sensitivity = -0.5 
    accel_profile = flat
    force_no_accel = true
}

general {
    border_size = 3
    col.active_border = $mauve $flamingo 90deg
    col.inactive_border = $subtext0
    resize_on_border = true
    gaps_in = 4
    gaps_out = 8
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 4
    
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true 
    }

}

animations {
    enabled = true

    # Curvas de Beziers (O segredo da fluidez)
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = fluent, 0.1, 1, 0, 1

    # Janelas: Entrada, Saída e Movimento
    # animação = nome, ligar(1/0), velocidade, curva, estilo
    animation = windows, 1, 6, myBezier, slide
    animation = windowsOut, 1, 6, myBezier, popin 80%
    animation = windowsMove, 1, 5, myBezier

    # Efeito de Fade (Transparência)
    animation = fade, 1, 7, default
    animation = fadeOut, 1, 5, default

    # Workspaces: Onde a suavidade mais aparece
    animation = workspaces, 1, 5, fluent, slide

    # Borda Giratória (Você já tinha o linear, aqui está corrigido)
    bezier = linear, 0, 0, 1, 1
    animation = borderangle, 1, 30, linear, loop
}


dwindle {
    pseudotile = true 
    preserve_split = true # ESSENCIAL: mantém a direção do split que você escolher
}

# master {
#     # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
#     new_is_master = true
# }

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    #workspace_swipe = off
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.
# layerrule = noanim, wofi

windowrule = match:class ^(steam_app_.*)$, stay_focused on

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = super

# Sound through pactl
bind = , XF86AudioRaiseVolume, exec, pactl  set-sink-volume @DEFAULT_SINK@ +10%
bind = , XF86AudioLowerVolume, exec, pactl  set-sink-volume @DEFAULT_SINK@ -10%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle


# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, return, exec, $terminal
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, space, exec, $menu
bind = $SUPER_SHIFT, l, exec, hyprlock
bind = $SUPER_SHIFT, R, exec, hyprctl reload
bind = $SUPER_SHIFT, D, exec, hyprctl keyword monitor eDP-1, disable
bind = $SUPER_SHIFT, F, exec, hyprctl keyword monitor eDP-1, enable
bind = SUPER CTRL SHIFT, S, exec, hyprshot -m window
bind = CTRL SHIFT, S, exec, hyprshot -m region
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, E, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen, # dwindle
bind = $mainMod, X, exec, wlogout -b 2 -L 900 -R 900
bind = $mainMod, G, togglegroup, # dwindle
bind = $mainMod, tab , changegroupactive,f  # dwindle
bind = $mainMod SHIFT, tab , changegroupactive, b  # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left , movefocus, l
bind = $mainMod, right , movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows with mainMod shift + arrow keys

bind = $mainMod SHIFT, left , movewindow, l
bind = $mainMod SHIFT, right , movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d


# Entrar no modo de redimensionamento
bind = $mainMod, r, submap, resize

submap = resize
    # Teclas HJKL para redimensionar
    binde = , right, resizeactive, 20 0
    binde = , left, resizeactive, -20 0
    binde = , up, resizeactive, 0 -20
    binde = , down, resizeactive, 0 20

    # Usar ESC ou Enter para sair do modo
    bind = , escape, submap, reset 
    bind = , return, submap, reset 
submap = reset



# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
